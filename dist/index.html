    <title>4 Nerds Event Tracker</title>
    <script type="module" crossorigin src="/assets/index-DkjZdFIX.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/scanner-tesseract-DkSqF2Y6.js">
    <link rel="stylesheet" crossorigin href="/assets/index-B7ZcUUuY.css">
  <link rel="manifest" href="/manifest.webmanifest"></head>
  <body>
    <div id="root">
      <main id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f8fafc;color:#0f172a;font-family:system-ui,sans-serif;text-align:center">
        <section>
          <h1 style="font-size:22px;margin:0 0 8px">Loading 4 Nerds…</h1>
          <p id="boot-status" style="margin:0;color:#475569">Starting the app.</p>
          <div id="boot-actions" style="display:none;margin-top:16px">
            <button onclick="location.reload()" style="padding:12px 18px;border:0;border-radius:12px;background:#ea580c;color:white;font-weight:700">Reload</button>
            <button onclick="window.__clear4NerdsCache()" style="padding:12px 18px;border:1px solid #cbd5e1;border-radius:12px;background:white;color:#0f172a;font-weight:700">Clear Cache</button>
          </div>
        </section>
      </main>
    </div>
    <script>
      window.__clear4NerdsCache = async function () {
        try {
          if ("serviceWorker" in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(function (registration) { return registration.unregister(); }));
          }
          if ("caches" in window) {
            const names = await caches.keys();
            await Promise.all(names.map(function (name) { return caches.delete(name); }));
          }
        } finally { location.reload(); }
      };
      window.setTimeout(function () {
        if (document.documentElement.dataset.appMounted === "true") return;
        var title = document.querySelector("#boot-fallback h1");
        var status = document.getElementById("boot-status");
        var actions = document.getElementById("boot-actions");
        if (title) title.textContent = "4 Nerds could not start.";
        if (status) status.textContent = "Reload the app, or clear stale cached files.";
        if (actions) actions.style.display = "block";
      }, 9000);
    </script>
  </body>
